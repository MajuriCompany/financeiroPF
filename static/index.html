<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finanças Pessoais</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=4" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- Tela de login -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <div class="login-logo">💰</div>
      <h1 class="login-title">Finanças PF</h1>
      <p class="login-sub">Controle pessoal de finanças</p>

      <!-- Login -->
      <div id="login-panel">
        <form id="login-form" onsubmit="submitLogin(event)">
          <div class="form-group" style="margin-bottom:14px">
            <label>Usuário</label>
            <input type="text" id="login-username" placeholder="seu usuário" autocomplete="username" required />
          </div>
          <div class="form-group" style="margin-bottom:20px">
            <label>Senha</label>
            <input type="password" id="login-password" placeholder="••••••" autocomplete="current-password" required />
          </div>
          <div id="login-error" class="login-error hidden"></div>
          <button type="submit" id="login-btn" class="btn btn-primary" style="width:100%;padding:11px">Entrar</button>
        </form>
        <p class="login-toggle">Não tem conta? <a href="#" onclick="showRegister(event)">Registrar</a></p>
      </div>

      <!-- Register -->
      <div id="register-panel" class="hidden">
        <form id="register-form" onsubmit="submitRegister(event)">
          <div class="form-group" style="margin-bottom:14px">
            <label>Usuário</label>
            <input type="text" id="reg-username" placeholder="escolha um usuário" autocomplete="username" required />
          </div>
          <div class="form-group" style="margin-bottom:14px">
            <label>Senha</label>
            <input type="password" id="reg-password" placeholder="••••••" autocomplete="new-password" required />
          </div>
          <div class="form-group" style="margin-bottom:20px">
            <label>Confirmar senha</label>
            <input type="password" id="reg-password2" placeholder="••••••" autocomplete="new-password" required />
          </div>
          <div id="reg-error" class="login-error hidden"></div>
          <button type="submit" id="reg-btn" class="btn btn-primary" style="width:100%;padding:11px">Criar conta</button>
        </form>
        <p class="login-toggle">Já tem conta? <a href="#" onclick="showLoginPanel(event)">Entrar</a></p>
      </div>
    </div>
  </div>

  <div id="app">
    <!-- Banner de dados inválidos -->
    <div id="invalid-banner" class="invalid-banner hidden">
      <span id="invalid-banner-text"></span>
      <button onclick="filterInvalid()" class="banner-btn">Ver transações</button>
      <button onclick="closeBanner()" class="banner-close">✕</button>
    </div>

    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="logo-mark">💰</div>
          <div class="logo-info">
            <span class="logo-text">Finanças PF</span>
            <span class="logo-sub">Controle pessoal</span>
          </div>
        </div>

        <nav class="sidebar-nav">
          <span class="nav-section-label">Menu</span>
          <a class="nav-item active" data-view="dashboard" onclick="navigate('dashboard')">
            <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            Dashboard
          </a>
          <a class="nav-item" data-view="transactions" onclick="navigate('transactions')">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6zm0 4h8v2H6zm10 0h2v2h-2zm-6-4h8v2h-8z"/></svg>
            Transações
          </a>
          <a class="nav-item" data-view="report" onclick="navigate('report')">
            <svg viewBox="0 0 24 24"><path d="M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2zm1 5v2h3V8H6zm0 4v2h3v-2H6zm0 4v2h3v-2H6zm5-8v2h6V8h-6zm0 4v2h6v-2h-6zm0 4v2h4v-2h-4z"/></svg>
            Relatórios
          </a>
          <a class="nav-item" data-view="categories" onclick="navigate('categories')">
            <svg viewBox="0 0 24 24"><path d="M12 2l-5.5 9h11zm0 3.84L14.6 10H9.4zM17.5 13c-2.49 0-4.5 2.01-4.5 4.5S15.01 22 17.5 22 22 19.99 22 17.5 19.99 13 17.5 13zm0 7c-1.38 0-2.5-1.12-2.5-2.5S16.12 15 17.5 15s2.5 1.12 2.5 2.5S18.88 20 17.5 20zM3 13.5h8v8H3z"/></svg>
            Categorias
          </a>
        </nav>

        <div class="sidebar-footer">
          <button class="btn btn-primary btn-full" onclick="openTransactionModal()">
            + Nova Transação
          </button>
          <div class="sidebar-user">
            <div class="user-avatar" id="sidebar-avatar">?</div>
            <span class="user-name" id="sidebar-username">—</span>
            <button class="logout-btn" onclick="logout()" title="Sair">⏻</button>
          </div>
        </div>
      </aside>

      <!-- Conteúdo principal -->
      <main id="main-content" class="main-content">
        <div class="loading"><div class="spinner"></div></div>
      </main>
    </div>
  </div>

  <!-- Modal de transação -->
  <div id="tx-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Nova Transação</h2>
        <button onclick="closeTransactionModal()" class="modal-close">✕</button>
      </div>
      <form id="tx-form" class="modal-body" onsubmit="submitTransaction(event)">
        <div class="form-row">
          <div class="form-group full">
            <label>Descrição *</label>
            <input type="text" name="description" required placeholder="Ex: Supermercado" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Tipo *</label>
            <select name="type" required onchange="toggleTypeStyle(this)">
              <option value="expense">Despesa</option>
              <option value="income">Receita</option>
              <option value="investment">Investimento</option>
            </select>
          </div>
          <div class="form-group">
            <label>Valor (R$)</label>
            <input type="number" name="amount" step="0.01" min="0" placeholder="0,00" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Categoria *</label>
            <select name="category" id="form-category" required></select>
          </div>
          <div class="form-group">
            <label>Data *</label>
            <input type="date" name="date" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Responsável</label>
            <select name="responsible">
              <option value="">— Selecione —</option>
              <option value="Nicolas">Nicolas</option>
              <option value="Camila">Camila</option>
              <option value="Juntos">Juntos</option>
              <option value="Outros">Outros</option>
            </select>
          </div>
          <div class="form-group">
            <label>Método de Pagamento</label>
            <select name="payment_method">
              <option value="">— Selecione —</option>
              <option value="Cartão de Crédito">Cartão de Crédito</option>
              <option value="PIX">PIX</option>
              <option value="Transferência">Transferência</option>
              <option value="Dinheiro">Dinheiro</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group full">
            <label>Observações</label>
            <textarea name="notes" rows="2" placeholder="Observações opcionais..."></textarea>
          </div>
        </div>

        <div class="form-row" id="invalid-flag-row" style="display:none">
          <div class="form-group full">
            <label class="checkbox-label">
              <input type="checkbox" name="amount_invalid" id="amount-invalid-cb" />
              <span>Marcar valor como inválido / pendente de correção</span>
            </label>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" onclick="closeTransactionModal()" class="btn btn-ghost">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal de confirmação -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 id="confirm-title">Confirmar</h2>
        <button onclick="closeConfirmModal()" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <p id="confirm-message"></p>
      </div>
      <div class="modal-footer">
        <button onclick="closeConfirmModal()" class="btn btn-ghost">Cancelar</button>
        <button id="confirm-ok" class="btn btn-danger">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Modal de categoria -->
  <div id="cat-modal" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 id="cat-modal-title">Nova Categoria</h2>
        <button onclick="closeCatModal()" class="modal-close">✕</button>
      </div>
      <form id="cat-form" class="modal-body" onsubmit="submitCategory(event)">
        <div class="form-group full">
          <label>Nome da Categoria *</label>
          <input type="text" name="cat_name" id="cat-name-input" required placeholder="Ex: Moradia" />
        </div>
        <input type="hidden" id="cat-edit-id" value="" />
        <div class="modal-footer">
          <button type="button" onclick="closeCatModal()" class="btn btn-ghost">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/app.js?v=4"></script>
</body>
</html>
