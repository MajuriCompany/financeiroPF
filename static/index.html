<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finanças Pessoais</title>
  <link rel="stylesheet" href="/static/style.css?v=3" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Banner de dados inválidos -->
    <div id="invalid-banner" class="invalid-banner hidden">
      <span id="invalid-banner-text"></span>
      <button onclick="filterInvalid()" class="banner-btn">Ver transações</button>
      <button onclick="closeBanner()" class="banner-close">✕</button>
    </div>

    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <span class="logo-icon">💰</span>
          <span class="logo-text">Finanças</span>
        </div>

        <nav class="sidebar-nav">
          <a class="nav-item active" data-view="dashboard" onclick="navigate('dashboard')">
            <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            Dashboard
          </a>
          <a class="nav-item" data-view="transactions" onclick="navigate('transactions')">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6zm0 4h8v2H6zm10 0h2v2h-2zm-6-4h8v2h-8z"/></svg>
            Transações
          </a>
          <a class="nav-item" data-view="report" onclick="navigate('report')">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/><path d="M7 17l5-5 5 5H7z" fill="none"/><path d="M5 9h14v2H5zm0 4h14v2H5z" fill="none"/><rect x="5" y="8" width="14" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="11" x2="19" y2="11" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="14" x2="19" y2="14" stroke="currentColor" stroke-width="1.5"/></svg>
            Relatórios
          </a>
          <a class="nav-item" data-view="categories" onclick="navigate('categories')">
            <svg viewBox="0 0 24 24"><path d="M12 2l-5.5 9h11z"/><circle cx="17.5" cy="17.5" r="4.5"/><rect x="3" y="13" width="8" height="8"/></svg>
            Categorias
          </a>
        </nav>

        <div class="sidebar-footer">
          <button class="btn btn-primary btn-full" onclick="openTransactionModal()">
            + Nova Transação
          </button>
        </div>
      </aside>

      <!-- Conteúdo principal -->
      <main id="main-content" class="main-content">
        <div class="loading"><div class="spinner"></div></div>
      </main>
    </div>
  </div>

  <!-- Modal de transação -->
  <div id="tx-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Nova Transação</h2>
        <button onclick="closeTransactionModal()" class="modal-close">✕</button>
      </div>
      <form id="tx-form" class="modal-body" onsubmit="submitTransaction(event)">
        <div class="form-row">
          <div class="form-group full">
            <label>Descrição *</label>
            <input type="text" name="description" required placeholder="Ex: Supermercado" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Tipo *</label>
            <select name="type" required onchange="toggleTypeStyle(this)">
              <option value="expense">Despesa</option>
              <option value="income">Receita</option>
              <option value="investment">Investimento</option>
            </select>
          </div>
          <div class="form-group">
            <label>Valor (R$)</label>
            <input type="number" name="amount" step="0.01" min="0" placeholder="0,00" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Categoria *</label>
            <select name="category" id="form-category" required></select>
          </div>
          <div class="form-group">
            <label>Data *</label>
            <input type="date" name="date" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Responsável</label>
            <select name="responsible">
              <option value="">— Selecione —</option>
              <option value="Nicolas">Nicolas</option>
              <option value="Camila">Camila</option>
              <option value="Juntos">Juntos</option>
              <option value="Outros">Outros</option>
            </select>
          </div>
          <div class="form-group">
            <label>Método de Pagamento</label>
            <select name="payment_method">
              <option value="">— Selecione —</option>
              <option value="Cartão de Crédito">Cartão de Crédito</option>
              <option value="PIX">PIX</option>
              <option value="Transferência">Transferência</option>
              <option value="Dinheiro">Dinheiro</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group full">
            <label>Observações</label>
            <textarea name="notes" rows="2" placeholder="Observações opcionais..."></textarea>
          </div>
        </div>

        <div class="form-row" id="invalid-flag-row" style="display:none">
          <div class="form-group full">
            <label class="checkbox-label">
              <input type="checkbox" name="amount_invalid" id="amount-invalid-cb" />
              <span>Marcar valor como inválido / pendente de correção</span>
            </label>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" onclick="closeTransactionModal()" class="btn btn-ghost">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal de confirmação -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 id="confirm-title">Confirmar</h2>
        <button onclick="closeConfirmModal()" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <p id="confirm-message"></p>
      </div>
      <div class="modal-footer">
        <button onclick="closeConfirmModal()" class="btn btn-ghost">Cancelar</button>
        <button id="confirm-ok" class="btn btn-danger">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Modal de categoria -->
  <div id="cat-modal" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 id="cat-modal-title">Nova Categoria</h2>
        <button onclick="closeCatModal()" class="modal-close">✕</button>
      </div>
      <form id="cat-form" class="modal-body" onsubmit="submitCategory(event)">
        <div class="form-group full">
          <label>Nome da Categoria *</label>
          <input type="text" name="cat_name" id="cat-name-input" required placeholder="Ex: Moradia" />
        </div>
        <input type="hidden" id="cat-edit-id" value="" />
        <div class="modal-footer">
          <button type="button" onclick="closeCatModal()" class="btn btn-ghost">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/app.js?v=3"></script>
</body>
</html>
